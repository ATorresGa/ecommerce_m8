<div class="card h-100 shadow-sm">
  {% if producto.imagen %}

  <img
    src="{{ producto.imagen.url }}"
    class="card-img-top"
    alt="{{ producto.nombre }}"
  />

  {% else %}

  <div
    class="card-img-top d-flex align-items-center justify-content-center bg-light"
  >
    <i class="bi bi-image fs-1 text-secondary"></i>
  </div>

  {% endif %}

  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ producto.nombre }}</h5>

    <p class="card-text flex-grow-1">
      {{ producto.descripcion|truncatewords:15 }}
    </p>

    <h4 class="text-primary fw-bold">${{ producto.precio }}</h4>
  </div>

  <div class="card-footer bg-white border-0">
    <a
      href="{% url 'ecommerce:product_detail' producto.id %}"
      class="btn btn-outline-primary w-100"
    >
      Ver detalle
    </a>
  </div>
</div>
